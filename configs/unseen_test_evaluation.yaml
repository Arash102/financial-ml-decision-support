status: stage_09_configured_v4_breadth_post_hoc_retest
stage_title: breadth_model_post_hoc_retest_on_previously_inspected_2021_2024_period

scientific_status:
  classification: post_hoc_retest_previously_inspected_period
  prior_test_period_previously_inspected: true
  breadth_design_informed_by_prior_test_diagnostics: true
  confirmatory_claim_allowed: false
  external_validation_claim_allowed: false
  future_confirmation_required: true
  recommended_confirmation:
    - later data not used in any design decision
    - prospective paper trading

temporal_scope:
  train_end: '2021-03-20'
  unseen_test_start: '2021-03-21'
  signal_generation_end: '2024-09-22'
  outcome_observation_tail_end: '2024-10-26'

frozen_inputs:
  frozen_universe_manifest: results/manifests/02_frozen_universe.csv
  stage04_candidate_policy: results/manifests/04_candidate_filter_policy.json
  stage07_model_manifest: results/manifests/07_frozen_model_training_manifest.json
  stage07_model_file: results/models/07_frozen_xgboost_pipeline.joblib
  stage08_policy: results/manifests/08_probability_signal_policy.json
  stage08_manifest: results/manifests/08_probability_signal_policy_manifest.json
  selected_model: xgboost
  selected_feature_set: I_full_40
  selected_trial: 10
  expected_model_sha256: 73a781551cdabd6bb67f5b9c0836a8683372e46487d9aade29e6320006086c1f
  expected_universe_size: 499
  expected_unseen_test_rows: 371321
  expected_unseen_test_eligible_events: 359454
  expected_candidate_events: 78189
  expected_signal_dates: 820
  expected_selected_signals: 4311
  expected_raw_features: 40
  expected_numeric_features: 38
  expected_categorical_features:
    - gmma_state
    - market_breadth_regime
  expected_transformed_features: 47
  expected_inference_lock_sha256: null
  expected_performance_metrics: null

feature_inference:
  base_feature_history_policy: concatenate_frozen_train_and_evaluation_history_then_compute_causal_features
  market_index_policy: cross_file_median_on_each_date
  market_index_consistency_relative_tolerance: 1.0e-10
  market_feature_history_end: '2024-09-22'
  stock_rolling_history_includes_train_tail: true
  zigzag_history_includes_train_tail: true
  zigzag_confirmation_gated: true
  candidate_threshold_fraction: 0.15
  candidate_side: long
  future_outcomes_used_for_feature_generation: false
  stage04_breadth:
    schema_version: stage04_pooled_v8_causal_market_breadth_extension
    frozen_universe_previous_valid_adjusted_close_returns: true
    raw_formula: (positive_symbols - negative_symbols) / valid_symbols
    zero_returns_in_denominator: true
    missing_or_suspended_symbols_excluded: true
    ema_span: 30
    ema_adjust: false
    ema_min_periods: 30
    slope_lag_market_dates: 5
    warmup_numeric_fill_value: 0.0
    warmup_categorical_state: warmup_unavailable
    same_day_or_past_only: true
  started_run_length:
    source: original_started_column
    recomputed: false
    raw_data_preferred: true
    labeled_evaluation_fallback: true
  hard_started_filter_applied: false
  hard_breadth_filter_applied: false

inference_lock:
  write_scores_before_outcome_join: true
  lock_file: results/predictions/09_unseen_test_inference_lock.csv
  lock_manifest: results/manifests/09_unseen_test_inference_lock.json
  outcome_columns_in_lock_file: false
  expected_file_sha256: null
  expected_performance_metrics_supplied_before_lock: false

frozen_signal_policy:
  score_interpretation: uncalibrated_ranking_score
  calibration_method: raw_identity
  calibrator_fitted: false
  policy_type: daily_cross_sectional_top_fraction
  selected_fraction: 0.05
  minimum_signals_per_date: 1
  ranking_order:
    - score_descending
    - symbol_ascending
    - event_id_ascending
  fixed_probability_threshold_selected: false

corrected_event_outcome_policy:
  horizon_observations: 30
  entry_price: adjusted_last_price_on_signal_date
  monitored_window: next_30_trading_observations_excluding_signal_date
  upper_barrier_return: 0.15
  lower_barrier_return: -0.15
  upper_event_return: maximum_adjusted_high_return_over_complete_30_observation_window
  lower_event_return: fixed_minus_15_percent
  vertical_event_return: adjusted_last_return_on_trading_observation_30
  zero_vertical_return_is_winner: false
  upper_return_is_ex_post_maximum_favorable_outcome: true
  executable_exit_rule_claim_allowed: false
  portfolio_return_claim_allowed: false
  signal_generation_after_2024_09_22: false
  outcome_tail_used_only_to_complete_existing_signal_windows: true
  reconstruction_population: frozen_policy_selected_signals_only

evaluation:
  predictive_metrics:
    - roc_auc
    - average_precision
    - brier_score
    - log_loss
    - expected_calibration_error
  signal_classification_metrics:
    - precision
    - precision_lift
    - specificity
    - sensitivity
  corrected_signal_outcome_metrics:
    - win_rate
    - mean_corrected_event_return
    - median_corrected_event_return
    - average_winning_return
    - average_losing_return
    - payoff_ratio
    - profit_factor
  yearly_stability_report: true
  barrier_outcome_report: true
  portfolio_backtest_performed: false
  transaction_costs_applied: false
  interpret_corrected_event_return_as: gross_event_level_outcome_not_portfolio_return
  corrected_signal_outcome_population: frozen_policy_selected_signals_only

safeguards:
  model_retrained: false
  hyperparameters_changed: false
  selected_feature_set_changed: false
  candidate_threshold_changed: false
  calibration_refit: false
  signal_fraction_changed: false
  hard_started_filter_applied: false
  hard_breadth_filter_applied: false
  test_labels_used_before_inference_lock: false
  test_outcomes_used_before_inference_lock: false
  expected_performance_metrics_supplied_before_lock: false
  portfolio_constraints_selected: false
