status: stage_10b_exploratory_posthoc_v1_1
stage_title: exploratory_started_nonzero_zigzag15_capacity_liquidity_portfolio_backtest
schema_version: stage10b_v1_1_exploratory_started_nonzero_zigzag15_capacity_liquidity

baseline_stage10:
  manifest_file: results/manifests/10_portfolio_backtest_manifest.json
  expected_git_commit_sha: 11f1dc1a1acabe3e8542b353a94e3beafff60c71
  expected_configuration_hash: efc837c4be74d5d7d94176bb048210d2a6c8f96c32850ddbc3f7b9bee725ec53
  interpretation: confirmatory_stage10_result_already_observed

exploratory_status:
  posthoc: true
  confirmatory_claim_allowed: false
  purpose: >
    Diagnose whether the already observed Stage 10 weakness is explained by
    the final started condition, liquidity sizing, or portfolio capacity.

# The full 78,189-row inference lock is used. Model scores are not recomputed.
frozen_stage09:
  producer_commit_sha: d7112980a69a99e0c183561bed2ff8b11b72bd33
  frozen_tag: milestone-09-v3-confirmatory-signal-evaluation
  inference_lock_file: results/predictions/09_unseen_test_inference_lock.csv
  expected_inference_lock_sha256: c29f1ec3b6d59fc5a2aa163f65b880562271f938fc7208a784ee820f5245c946
  expected_candidate_events: 78189
  expected_signal_dates: 820
  score_interpretation: uncalibrated_ranking_score
  model_scores_changed: false
  model_retrained: false

final_signal_filter:
  application_order:
    - load_frozen_stage09_inference_lock
    - join_existing_started_by_symbol_and_date
    - retain_started_nonzero
    - inherit_exact_stage09_causal_zigzag15_candidate_eligibility
    - rerank_score_desc_symbol_asc_event_id_asc
    - apply_daily_top_fraction_policy
  started_filter_rule: nonzero
  started_zero_is_rejected: true
  started_nonzero_is_accepted: true
  started_recomputed: false
  started_source:
    primary_directory: data_ready/unseen_test
    fallback_directory: raw_data
    date_column: dEven
    column: started
  zigzag:
    threshold_fraction: 0.15
    inherited_from_frozen_stage09_candidate_population: true
    recompute: false
    low_distance_rule: 0 <= distance_above_confirmed_low_fraction <= 0.15
    high_distance_rule: distance_below_confirmed_high_fraction >= 0.15
    geometry: confirmation_gated_causal_zigzag
  daily_policy:
    policy_type: daily_cross_sectional_top_fraction_after_final_filter
    selected_fraction: 0.05
    minimum_per_date: 1
    ranking_order:
      - score_descending
      - symbol_ascending
      - event_id_ascending

# No new market-regime rule is introduced because no exact causal formula and
# threshold were frozen. This prevents an invented post-result filter.
market_regime_filter:
  enabled: false

initial_capital:
  method: customer_transaction_size_anchored_initial_capital_proxy
  source_file: data_ready/portfolio/final_feature_dim.csv
  source_column: avg_Buy
  currency: IRR
  expected_customer_rows: 500
  trim_fraction_each_tail: 0.10
  expected_trimmed_mean_avg_buy_irr: 620315055.56125
  expected_primary_initial_capital_irr: 20316282773.64711
  expected_median_sensitivity_initial_capital_irr: 14488954106.360094
  expected_arithmetic_mean_sensitivity_initial_capital_irr: 199618998259.92108
  expected_value_relative_tolerance: 1.0e-10
  interpretation_note: >
    This is a customer transaction-size-anchored capital proxy, not directly
    observed total wealth or daily portfolio value.

market:
  direction: long_only
  short_selling_allowed: false
  adjusted_price_accounting: true
  synthetic_share_quantity_interpretation: true

market_data_quality:
  invalid_adjusted_ohlc_row_action: drop_before_execution_calendar
  invalid_rows_imputed_or_repaired: false
  invalid_rows_count_as_trading_observations: false
  signal_execution_plan_population_must_equal_selected_signals: true

execution:
  signal_timestamp: end_of_signal_day
  entry_timing: next_symbol_trading_observation_open
  signal_validity_observations: 1
  quantity_rounding: floor_to_positive_integer
  primary_slippage_each_side: 0.002
  same_bar_rule: adverse_stop_first
  cash_from_opening_exit_available_for_same_open_entries: true
  cash_from_intraday_exit_available_for_same_day_entries: false
  leverage_allowed: false

costs:
  source: user_supplied_1404_tse_fee_table
  application_policy: uniform_tse_schedule_for_all_symbols
  buy_total_rate: 0.00464
  sell_total_rate: 0.00964
  sell_tax_rate_included: 0.005
  sell_non_tax_rate: 0.00464
  historical_rate_reconstruction_performed: false

risk:
  risk_per_lot_fraction: 0.005
  maximum_symbol_open_risk_fraction: 0.015
  maximum_portfolio_open_risk_fraction: 0.10
  open_risk_definition: >
    max(0, total entry cash cost minus net proceeds at the currently executable
    protective stop)
  protected_lot_risk_treatment:
    trailing_pending: retain_current_risk
    trailing_active_at_or_above_net_break_even: zero
    locked_profit_treated_as_negative_risk: false

# Values below are overwritten per capacity profile during the scenario loop.
exposure:
  maximum_symbol_exposure_fraction: 0.20
  maximum_gross_exposure_fraction: 0.70
  protected_lots_still_count_toward_symbol_exposure: true
  protected_lots_still_count_toward_gross_exposure: true

capacity:
  maximum_distinct_symbols: 30
  maximum_open_lots: 60
  maximum_open_lots_per_symbol: 3
  maximum_new_lots_per_day: 10
  protected_lots_still_count_toward_lot_capacity: true
  protected_lots_still_count_toward_symbol_capacity: true

repeated_signals:
  primary_action: open_new_independent_lot_if_constraints_pass
  existing_lot_horizon_reset: false
  existing_lot_replaced: false
  score_weighted_position_size: false
  each_lot_has_independent_entry: true
  each_lot_has_independent_stop: true
  each_lot_has_independent_trailing_state: true
  each_lot_has_independent_30_observation_horizon: true

# Base values are overwritten per liquidity profile during the scenario loop.
liquidity:
  required: true
  adv_window_observations: 20
  minimum_adv_history_observations: 20
  maximum_fraction_of_adv20: 0.50
  direct_traded_value_column_candidates:
    - qTotCap
    - traded_value
    - trade_value
    - transaction_value
    - value
    - Value
    - total_value
  volume_column_candidates:
    - qTotTran5J
    - volume
    - Volume
    - trade_volume
    - total_volume
    - vol
  fallback_policy: adjusted_last_price_times_raw_volume_proxy
  fallback_limitation_note: >
    Adjusted price times raw volume is a liquidity proxy and may be distorted
    around corporate actions. The selected source is recorded by symbol.

exit_policy:
  initial_stop_loss_fraction: 0.15
  maximum_horizon_observations: 30
  time_exit_price: adjusted_last_price_on_observation_30
  trailing_activation_fraction: 0.15
  trailing_distance_fraction: 0.10
  fixed_take_profit_fraction: 0.15

liquidity_profiles:
  adv01:
    maximum_fraction_of_adv20: 0.01
    interpretation: conservative_stage10_control
  adv10:
    maximum_fraction_of_adv20: 0.10
    interpretation: moderate_capacity_sensitivity
  adv50:
    maximum_fraction_of_adv20: 0.50
    interpretation: optimistic_capacity_upper_bound_requested_by_research_owner

capacity_profiles:
  current:
    maximum_distinct_symbols: 10
    maximum_open_lots: 20
    maximum_open_lots_per_symbol: 3
    maximum_new_lots_per_day: 3
    maximum_symbol_exposure_fraction: 0.10
  expanded:
    maximum_distinct_symbols: 20
    maximum_open_lots: 40
    maximum_open_lots_per_symbol: 3
    maximum_new_lots_per_day: 5
    maximum_symbol_exposure_fraction: 0.20
  broad:
    maximum_distinct_symbols: 30
    maximum_open_lots: 60
    maximum_open_lots_per_symbol: 3
    maximum_new_lots_per_day: 10
    maximum_symbol_exposure_fraction: 0.20

exploratory_scenario_grid:
  liquidity_profiles:
    - adv01
    - adv10
    - adv50
  capacity_profiles:
    - current
    - expanded
    - broad
  position_structures:
    - multi_lot
    - single_lot
  exit_styles:
    - trailing
    - fixed_take_profit

# This is the requested revised operating case. It is exploratory, not confirmatory.
primary_scenario:
  liquidity_profile: adv50
  capacity_profile: broad
  position_structure: multi_lot
  exit_style: trailing

paths:
  raw_data: raw_data
  customer_data: data_ready/portfolio
  predictions: results/predictions
  audits: results/audits
  backtests: results/backtests
  manifests: results/manifests

safeguards:
  baseline_stage10_outputs_must_not_be_overwritten: true
  stage09_inference_lock_must_remain_identical: true
  stage09_outcome_columns_ignored_for_selection: true
  no_model_retraining: true
  no_score_recalculation: true
  no_short_positions: true
  no_leverage: true
  results_must_be_labeled_exploratory_posthoc: true
