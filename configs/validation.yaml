status: stage_05_configured

temporal_design:
  train_end: "2021-03-20"
  unseen_test_start: "2021-03-21"
  unseen_test_end: "2024-09-22"

universe_freeze:
  criteria_version: 1
  selection_scope: "train_only"
  minimum_train_observations: 600
  maximum_train_end_gap_calendar_days: 45
  maximum_train_critical_price_missing_fraction: 0.05
  maximum_train_any_price_issue_fraction: 0.05
  use_candidate_feature_missingness_for_selection: false
  use_unseen_test_coverage_for_selection: false

primary_validation:
  method: "purged_anchored_walk_forward"
  validation_unit: "calendar_date"
  calendar_source: "frozen_labeled_train"
  fold_boundary_unit: "unique_trading_dates"
  number_of_folds: 5
  first_validation_start_fraction: 0.50
  validation_window_partition: "equal_contiguous_trading_date_blocks"

  purge_method: "event_end_overlap"
  purge_rule: "training_event_end_must_be_before_validation_start"

  embargo_trading_days: 30
  embargo_position: "before_validation"
  embargo_semantics: "conservative_temporal_gap"
  embargo_rule: "training_event_start_must_be_on_or_before_train_end_before_embargo_gap"

  candidate_scope: "stage_04_primary_long_candidates"
  candidate_filter_threshold_fraction: 0.15
  target_column: "meta_label"
  event_start_column: "dEven"
  event_end_column: "event_end_date"

  require_binary_target: true
  require_both_classes_in_every_training_fold: true
  require_both_classes_in_every_validation_fold: true
  require_non_overlapping_validation_windows: true
  require_anchored_training_sets: true
  require_zero_train_validation_event_overlap: true
  require_zero_train_label_interval_overlap_with_validation: true

  fold_boundaries_frozen_before_model_selection: true
  unseen_test_used_for_fold_design: false

robustness_validation:
  method: "cpcv"
  enabled_during_primary_model_selection: false

rules:
  - "The unseen test must not be used for feature selection."
  - "The unseen test must not be used for label design."
  - "The unseen test must not be used for hyperparameter optimization."
  - "The unseen test must not be used for algorithm selection."
  - "The unseen test must not be used for threshold selection."
  - "The unseen test must not be used for universe optimization."
  - "Fold boundaries must be frozen before Notebook 06 model selection."
  - "All candidate events sharing the same event-start date belong to the same temporal side of a fold boundary."
  - "Training events whose label interval reaches the validation start are purged."
  - "A 30-trading-day conservative gap is placed immediately before every validation block."
