# Optional Conda environment.
# This file is retained because it is part of the repository architecture.
# Conda is NOT required. VS Code users can install requirements.txt with pip.

name: financial-ml-decision-support
channels:
  - conda-forge
dependencies:
  - python=3.12
  - jupyterlab>=4.2,<5
  - notebook>=7.2,<8
  - ipykernel>=6.29,<7
  - numpy>=2.0,<3
  - pandas>=2.2,<3
  - pyarrow>=17,<20
  - pyyaml>=6.0,<7
  - scikit-learn>=1.5,<2
  - xgboost>=2.1,<4
  - optuna>=4.0,<5
  - joblib>=1.4,<2
  - scipy>=1.14,<2
  - statsmodels>=0.14,<1
  - matplotlib>=3.9,<4
  - pip
